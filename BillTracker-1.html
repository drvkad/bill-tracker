<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bill Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:system-ui,sans-serif;background:#F7F6F2;color:#1A1917;min-height:100vh;padding-bottom:40px}

/* HEADER */
.hdr{background:#1A1917;color:#fff;padding:16px 20px;display:flex;align-items:center;justify-content:space-between}
.hdr-title{font-size:15px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.hdr-date{font-size:12px;color:#888}

/* DATA BAR */
.dbar{background:#1e3a5f;padding:12px 16px}
.dbar-msg{color:#c8d8f8;font-size:12px;margin-bottom:10px}
.dbar-btns{display:flex;gap:8px;flex-wrap:wrap}
.dbar-btns button,.dbar-btns label{padding:9px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none}
.btn-json{background:#3b82f6;color:#fff}
.btn-csv{background:#10b981;color:#fff}
.btn-restore{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3)!important}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:14px 16px 0}
.stat{background:#fff;border:1px solid #E2DFD9;border-radius:10px;padding:14px 8px;text-align:center}
.stat-num{font-size:16px;font-weight:700;margin-bottom:2px}
.stat-lbl{font-size:10px;color:#A09D97;text-transform:uppercase;letter-spacing:.04em}

/* BIG BUTTONS */
.big-btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:14px 16px 0}
.big-btn{border:none;border-radius:14px;padding:22px 12px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;font-size:15px;font-weight:700;color:#fff}
.big-btn-add{background:#2D5BE3}
.big-btn-view{background:#1e3a5f}
.big-btn-icon{font-size:36px}

/* CARD */
.card{background:#fff;border:1px solid #E2DFD9;border-radius:14px;padding:20px;margin:14px 16px 0}
.card-title{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#A09D97;margin-bottom:14px}
.sec-lbl{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#2D5BE3;margin:20px 0 12px;padding-bottom:6px;border-bottom:1px solid #EBF0FF}

/* UPLOAD */
.upload-zone{border:2px dashed #2D5BE3;border-radius:12px;padding:44px 20px;text-align:center;cursor:pointer;background:#EBF0FF}
.upload-zone-icon{font-size:52px;margin-bottom:10px}
.upload-zone-title{font-weight:700;color:#2D5BE3;font-size:16px;margin-bottom:4px}
.upload-zone-sub{font-size:13px;color:#6B6860}

/* FIELDS */
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;color:#A09D97;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.field input,.field select{width:100%;font-family:system-ui,sans-serif;font-size:16px;padding:13px 14px;border:1px solid #E2DFD9;border-radius:8px;background:#fff;color:#1A1917;outline:none}
.field input:focus,.field select:focus{border-color:#2D5BE3}

/* BUTTONS */
.btn-primary{width:100%;background:#2D5BE3;color:#fff;border:none;border-radius:10px;padding:15px;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px;font-family:system-ui,sans-serif}
.btn-secondary{width:100%;background:#F0EEE9;color:#1A1917;border:1px solid #E2DFD9;border-radius:10px;padding:14px;font-size:15px;font-weight:500;cursor:pointer;margin-top:8px;font-family:system-ui,sans-serif}
.btn-danger{width:100%;background:#C0392B;color:#fff;border:none;border-radius:10px;padding:15px;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px;font-family:system-ui,sans-serif}
.btn-back{background:none;border:none;color:#aaa;font-size:16px;cursor:pointer;padding:0}

/* SUB HEADER */
.sub-hdr{background:#1A1917;color:#fff;padding:14px 20px;display:flex;align-items:center;gap:16px}
.sub-hdr-title{font-size:15px;font-weight:600}

/* BILL CARDS */
.bill-card{background:#fff;border:1px solid #E2DFD9;border-radius:12px;padding:16px;margin:10px 16px 0}
.bill-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.bill-vendor{font-weight:700;font-size:16px;flex:1;margin-right:8px}
.bill-amt{font-weight:700;font-size:15px;white-space:nowrap}
.bill-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.tag{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.tag-due{background:#FEF3C7;color:#B45309}
.tag-paid{background:#E6F4ED;color:#1A7F4B}
.tag-overdue{background:#FBEAE8;color:#C0392B}
.tag-cat{background:#F0EEE9;color:#6B6860}
.bill-meta{font-size:12px;color:#6B6860;line-height:1.8;margin-bottom:10px}
.edit-btn{background:#F0EEE9;border:1px solid #E2DFD9;border-radius:8px;padding:9px 18px;font-size:14px;cursor:pointer;font-weight:500;font-family:system-ui,sans-serif}

/* FILTERS */
.filters{display:flex;gap:8px;padding:14px 16px 0;flex-wrap:wrap}
.f-btn{font-size:14px;padding:8px 18px;border-radius:20px;border:1px solid #E2DFD9;background:#fff;cursor:pointer;font-family:system-ui,sans-serif}
.f-btn.active{background:#1A1917;color:#fff;border-color:#1A1917}

/* LOADING / ERROR */
.loading{text-align:center;padding:48px 20px}
.loading-icon{font-size:36px;margin-bottom:12px}
.error-box{background:#FBEAE8;color:#C0392B;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:14px}
.empty{text-align:center;padding:60px 20px;color:#A09D97;font-size:15px}
.divider{text-align:center;margin:14px 0;color:#A09D97;font-size:13px}

/* QUERY */
.query-input{width:100%;font-family:system-ui,sans-serif;font-size:14px;padding:12px 14px;border:1px solid #E2DFD9;border-radius:8px;resize:none;margin-bottom:8px;outline:none}
.query-result{background:#EBF0FF;border-radius:8px;padding:14px;font-size:13px;line-height:1.6;margin-top:12px;white-space:pre-wrap;display:none}

/* PREVIEW IMG */
.preview-img{width:100%;border-radius:8px;margin-bottom:14px;max-height:200px;object-fit:contain;border:1px solid #E2DFD9;display:none}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1A1917;color:#fff;padding:12px 24px;border-radius:8px;font-size:13px;font-weight:600;z-index:999;transition:transform .3s;white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}

/* SCREENS */
.screen{display:none}
.screen.active{display:block}
</style>
</head>
<body>

<div class="toast" id="toast"></div>
<input type="file" id="file-input" accept="image/*" style="display:none">
<input type="file" id="restore-input" accept=".json" style="display:none">

<!-- ── HOME ── -->
<div class="screen active" id="screen-home">
  <div class="hdr">
    <span class="hdr-title">📋 Bill Tracker</span>
    <span class="hdr-date" id="hdr-date"></span>
  </div>
  <div class="dbar">
    <div class="dbar-msg">⚠️ Back up regularly — this is your tax record</div>
    <div class="dbar-btns">
      <button class="btn-json" onclick="exportJSON()">⬇ Backup JSON</button>
      <button class="btn-csv" onclick="exportCSV()">⬇ Export CSV</button>
      <label class="btn-restore">⬆ Restore<input type="file" accept=".json" style="display:none" onchange="importJSON(event)"></label>
    </div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-num" id="stat-total">0</div><div class="stat-lbl">Total</div></div>
    <div class="stat"><div class="stat-num" id="stat-due" style="color:#B45309">₹0</div><div class="stat-lbl">Due</div></div>
    <div class="stat"><div class="stat-num" id="stat-paid" style="color:#1A7F4B">₹0</div><div class="stat-lbl">Paid (month)</div></div>
  </div>
  <div class="big-btns">
    <button class="big-btn big-btn-add" onclick="goTo('add')"><span class="big-btn-icon">📷</span>Add Bill</button>
    <button class="big-btn big-btn-view" onclick="goTo('list')"><span class="big-btn-icon">🗂️</span>View Bills</button>
  </div>
  <div class="card">
    <div class="card-title">Ask About Your Bills</div>
    <textarea class="query-input" id="query-input" rows="2" placeholder="e.g. Which bills are due? What did I pay for electricity?"></textarea>
    <button class="btn-primary" id="ask-btn" onclick="runQuery()">Ask</button>
    <div class="query-result" id="query-result"></div>
  </div>
</div>

<!-- ── ADD ── -->
<div class="screen" id="screen-add">
  <div class="sub-hdr">
    <button class="btn-back" onclick="goTo('home')">← Back</button>
    <span class="sub-hdr-title">Add Bill</span>
  </div>
  <div class="card" id="add-upload-phase">
    <div class="upload-zone" onclick="document.getElementById('file-input').click()">
      <div class="upload-zone-icon">📷</div>
      <div class="upload-zone-title">Tap to photograph bill</div>
      <div class="upload-zone-sub">or choose from gallery</div>
    </div>
    <div class="divider">— or —</div>
    <button class="btn-secondary" onclick="showForm(false)">Enter details manually</button>
  </div>
  <div class="card" id="add-ready-phase" style="display:none">
    <img class="preview-img" id="preview-img" style="display:block">
    <button class="btn-primary" onclick="extractDetails()">✨ Extract Details from Photo</button>
    <button class="btn-secondary" onclick="showForm(true)">Fill in manually instead</button>
  </div>
  <div class="card" id="add-loading-phase" style="display:none">
    <div class="loading"><div class="loading-icon">⏳</div><div style="color:#6B6860">Reading your bill…</div></div>
  </div>
  <div class="card" id="add-form-phase" style="display:none">
    <img class="preview-img" id="preview-img2">
    <div class="error-box" id="add-error" style="display:none"></div>
    <div class="sec-lbl">Bill Details</div>
    <div class="field"><label>Vendor / Payee</label><input id="f-vendor" type="text" placeholder="e.g. BESCOM, Landlord"></div>
    <div class="field"><label>Category</label><select id="f-cat"><option value="">— Select —</option></select></div>
    <div class="field"><label>Invoice / Bill No.</label><input id="f-inv" type="text" placeholder="Optional"></div>
    <div class="field"><label>Bill Date</label><input id="f-date" type="date"></div>
    <div class="field"><label>Due Date</label><input id="f-due" type="date"></div>
    <div class="field"><label>Amount (₹)</label><input id="f-amt" type="number" placeholder="0.00" inputmode="decimal"></div>
    <div class="sec-lbl">Payment — fill later if needed</div>
    <div class="field"><label>Status</label><select id="f-status"><option value="Due">Due</option><option value="Paid">Paid</option><option value="Overdue">Overdue</option></select></div>
    <div class="field"><label>Payment Method</label><select id="f-method"><option value="">— Not paid yet —</option></select></div>
    <div class="field"><label>Date Paid</label><input id="f-paid" type="date"></div>
    <div class="field"><label>Notes</label><input id="f-notes" type="text" placeholder="Optional"></div>
    <button class="btn-primary" onclick="saveBill()">💾 Save Bill</button>
  </div>
</div>

<!-- ── LIST ── -->
<div class="screen" id="screen-list">
  <div class="sub-hdr">
    <button class="btn-back" onclick="goTo('home')">← Back</button>
    <span class="sub-hdr-title" id="list-title">All Bills</span>
  </div>
  <div class="filters">
    <button class="f-btn active" onclick="setFilter('all',this)">All</button>
    <button class="f-btn" onclick="setFilter('Due',this)">Due</button>
    <button class="f-btn" onclick="setFilter('Overdue',this)">Overdue</button>
    <button class="f-btn" onclick="setFilter('Paid',this)">Paid</button>
  </div>
  <div id="bills-list"></div>
</div>

<!-- ── EDIT ── -->
<div class="screen" id="screen-edit">
  <div class="sub-hdr">
    <button class="btn-back" onclick="goTo('list')">← Back</button>
    <span class="sub-hdr-title">Edit Bill</span>
  </div>
  <div class="card">
    <div class="sec-lbl">Bill Details</div>
    <div class="field"><label>Vendor</label><input id="e-vendor" type="text"></div>
    <div class="field"><label>Category</label><select id="e-cat"></select></div>
    <div class="field"><label>Invoice Number</label><input id="e-inv" type="text"></div>
    <div class="field"><label>Amount (₹)</label><input id="e-amt" type="number" inputmode="decimal"></div>
    <div class="field"><label>Bill Date</label><input id="e-date" type="date"></div>
    <div class="field"><label>Due Date</label><input id="e-due" type="date"></div>
    <div class="sec-lbl">Payment Info</div>
    <div class="field"><label>Status</label><select id="e-status"><option value="Due">Due</option><option value="Paid">Paid</option><option value="Overdue">Overdue</option></select></div>
    <div class="field"><label>Payment Method</label><select id="e-method"></select></div>
    <div class="field"><label>Date Paid</label><input id="e-paid" type="date"></div>
    <div class="field"><label>Notes</label><input id="e-notes" type="text"></div>
    <input type="hidden" id="e-id">
    <button class="btn-primary" onclick="saveEdit()">💾 Save Changes</button>
    <button class="btn-danger" onclick="deleteBill()">🗑 Delete Bill</button>
  </div>
</div>

<script>
const CATS = ["Electricity","Water","Internet / Broadband","Mobile / Phone","Rent","Tax","Insurance","Clinic / Medical","Supplies / Stock","Salary","Loan / EMI","Subscription","Other"];
const METHODS = ["UPI","Net Banking","Cash","Cheque","Auto-debit","Credit Card","Debit Card","NEFT / RTGS"];
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const KEY = "billtracker_v1";

// Populate selects
["f-cat","e-cat"].forEach(id => {
  const s = document.getElementById(id);
  const hasBlank = id === "f-cat";
  if (hasBlank) s.innerHTML = '<option value="">— Select —</option>';
  CATS.forEach(c => s.innerHTML += `<option value="${c}">${c}</option>`);
});
["f-method","e-method"].forEach(id => {
  const s = document.getElementById(id);
  s.innerHTML = '<option value="">— Not paid yet —</option>';
  METHODS.forEach(m => s.innerHTML += `<option value="${m}">${m}</option>`);
});

// State
let bills = [];
let currentFilter = "all";
let currentImageB64 = null;

try { bills = JSON.parse(localStorage.getItem(KEY) || "[]"); } catch {}

function save() { try { localStorage.setItem(KEY, JSON.stringify(bills)); } catch {} }

// Date / amount helpers
const now = new Date();
document.getElementById("hdr-date").textContent = `${now.getDate()} ${MONTHS[now.getMonth()]} ${now.getFullYear()}`;

function fmt(d) {
  if (!d) return "—";
  const [y,m,day] = d.split("-");
  return `${parseInt(day)} ${MONTHS[parseInt(m)-1]} ${y}`;
}
function fmtAmt(n) {
  return "₹" + (parseFloat(n)||0).toLocaleString("en-IN", {minimumFractionDigits:2});
}

// Screen nav
function goTo(s) {
  document.querySelectorAll(".screen").forEach(el => el.classList.remove("active"));
  document.getElementById("screen-" + s).classList.add("active");
  window.scrollTo(0,0);
  if (s === "home") renderStats();
  if (s === "list") renderList();
  if (s === "add") resetAddForm();
}

// Stats
function renderStats() {
  document.getElementById("stat-total").textContent = bills.length;
  const due = bills.filter(b => b.status !== "Paid").reduce((s,b) => s+(parseFloat(b.amount)||0), 0);
  document.getElementById("stat-due").textContent = "₹" + due.toLocaleString("en-IN",{maximumFractionDigits:0});
  const pm = bills.filter(b => b.status==="Paid" && b.paidDate && new Date(b.paidDate).getMonth()===now.getMonth() && new Date(b.paidDate).getFullYear()===now.getFullYear()).reduce((s,b) => s+(parseFloat(b.amount)||0), 0);
  document.getElementById("stat-paid").textContent = "₹" + pm.toLocaleString("en-IN",{maximumFractionDigits:0});
}

// List
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll(".f-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderList();
}

function renderList() {
  const filtered = currentFilter === "all" ? bills : bills.filter(b => b.status === currentFilter);
  document.getElementById("list-title").textContent = `All Bills (${bills.length})`;
  const el = document.getElementById("bills-list");
  if (!filtered.length) { el.innerHTML = '<div class="empty">🗂️<br>No bills here</div>'; return; }
  el.innerHTML = filtered.map(b => {
    const sc = b.status==="Paid" ? "tag-paid" : b.status==="Overdue" ? "tag-overdue" : "tag-due";
    return `<div class="bill-card">
      <div class="bill-top"><div class="bill-vendor">${esc(b.vendor||"Unknown")}</div><div class="bill-amt">${fmtAmt(b.amount)}</div></div>
      <div class="bill-tags"><span class="tag ${sc}">${b.status}</span>${b.category?`<span class="tag tag-cat">${esc(b.category)}</span>`:""}</div>
      <div class="bill-meta">${b.invoice?`Bill No: ${esc(b.invoice)}<br>`:""}${b.date?`Billed: ${fmt(b.date)}${b.due?` · Due: ${fmt(b.due)}`:""}`:""
      }${b.method?`<br>Paid via ${esc(b.method)}${b.paidDate?` on ${fmt(b.paidDate)}`:""}`:""}${b.notes?`<br>Note: ${esc(b.notes)}`:""}</div>
      <button class="edit-btn" onclick="openEdit('${b.id}')">✏️ Edit</button>
    </div>`;
  }).join("");
}

// ADD FLOW
function resetAddForm() {
  currentImageB64 = null;
  document.getElementById("add-upload-phase").style.display = "block";
  document.getElementById("add-ready-phase").style.display = "none";
  document.getElementById("add-loading-phase").style.display = "none";
  document.getElementById("add-form-phase").style.display = "none";
  document.getElementById("preview-img").style.display = "none";
  document.getElementById("preview-img2").style.display = "none";
  ["f-vendor","f-inv","f-date","f-due","f-amt","f-paid","f-notes"].forEach(id => document.getElementById(id).value = "");
  document.getElementById("f-cat").value = "";
  document.getElementById("f-status").value = "Due";
  document.getElementById("f-method").value = "";
  document.getElementById("add-error").style.display = "none";
  document.getElementById("file-input").value = "";
}

document.getElementById("file-input").addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  document.getElementById("preview-img").src = url;
  document.getElementById("preview-img").style.display = "block";
  document.getElementById("add-upload-phase").style.display = "none";
  document.getElementById("add-ready-phase").style.display = "block";
  // Compress
  compressImage(file, b64 => { currentImageB64 = b64; });
});

function compressImage(file, cb) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const MAX = 1000;
      let w = img.width, h = img.height;
      if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
      const c = document.createElement("canvas");
      c.width = w; c.height = h;
      c.getContext("2d").drawImage(img, 0, 0, w, h);
      cb(c.toDataURL("image/jpeg", 0.8).split(",")[1]);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function showForm(withImg) {
  document.getElementById("add-upload-phase").style.display = "none";
  document.getElementById("add-ready-phase").style.display = "none";
  document.getElementById("add-form-phase").style.display = "block";
  if (withImg) {
    const src = document.getElementById("preview-img").src;
    document.getElementById("preview-img2").src = src;
    document.getElementById("preview-img2").style.display = "block";
  }
}

async function extractDetails() {
  if (!currentImageB64) { showForm(true); return; }
  document.getElementById("add-ready-phase").style.display = "none";
  document.getElementById("add-loading-phase").style.display = "block";
  try {
    const r = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ model:"claude-sonnet-4-6", max_tokens:400,
        messages:[{role:"user",content:[
          {type:"image",source:{type:"base64",media_type:"image/jpeg",data:currentImageB64}},
          {type:"text",text:`Extract from this bill/invoice. Return ONLY a raw JSON object, no markdown:\n{"vendor":"","category":"one of: ${CATS.join(", ")}","invoice_number":"","bill_date":"YYYY-MM-DD or empty string","due_date":"YYYY-MM-DD or empty string","amount":0}`}
        ]}]
      })
    });
    const d = await r.json();
    const txt = (d.content?.find(x=>x.type==="text")?.text||"{}").replace(/```json|```/g,"").trim();
    const p = JSON.parse(txt);
    document.getElementById("f-vendor").value = p.vendor || "";
    document.getElementById("f-cat").value = CATS.includes(p.category) ? p.category : "";
    document.getElementById("f-inv").value = p.invoice_number || "";
    document.getElementById("f-date").value = p.bill_date || "";
    document.getElementById("f-due").value = p.due_date || "";
    document.getElementById("f-amt").value = p.amount || "";
    document.getElementById("add-loading-phase").style.display = "none";
    showForm(true);
  } catch {
    document.getElementById("add-loading-phase").style.display = "none";
    document.getElementById("add-error").textContent = "Could not extract — please fill in manually.";
    document.getElementById("add-error").style.display = "block";
    showForm(true);
  }
}

function saveBill() {
  const bill = {
    id: Date.now().toString(),
    vendor: document.getElementById("f-vendor").value || "Unknown",
    category: document.getElementById("f-cat").value,
    invoice: document.getElementById("f-inv").value,
    date: document.getElementById("f-date").value,
    due: document.getElementById("f-due").value,
    amount: parseFloat(document.getElementById("f-amt").value) || 0,
    status: document.getElementById("f-status").value,
    method: document.getElementById("f-method").value,
    paidDate: document.getElementById("f-paid").value,
    notes: document.getElementById("f-notes").value,
    addedOn: new Date().toISOString()
  };
  bills.unshift(bill);
  save();
  renderStats();
  toast("✅ Bill saved!");
  goTo("home");
}

// EDIT
function openEdit(id) {
  const b = bills.find(x => x.id === id);
  if (!b) return;
  document.getElementById("e-id").value = id;
  document.getElementById("e-vendor").value = b.vendor || "";
  document.getElementById("e-cat").value = b.category || "";
  document.getElementById("e-inv").value = b.invoice || "";
  document.getElementById("e-amt").value = b.amount || "";
  document.getElementById("e-date").value = b.date || "";
  document.getElementById("e-due").value = b.due || "";
  document.getElementById("e-status").value = b.status || "Due";
  document.getElementById("e-method").value = b.method || "";
  document.getElementById("e-paid").value = b.paidDate || "";
  document.getElementById("e-notes").value = b.notes || "";
  goTo("edit");
}

function saveEdit() {
  const id = document.getElementById("e-id").value;
  const idx = bills.findIndex(b => b.id === id);
  if (idx === -1) return;
  bills[idx] = { ...bills[idx],
    vendor: document.getElementById("e-vendor").value,
    category: document.getElementById("e-cat").value,
    invoice: document.getElementById("e-inv").value,
    amount: parseFloat(document.getElementById("e-amt").value) || 0,
    date: document.getElementById("e-date").value,
    due: document.getElementById("e-due").value,
    status: document.getElementById("e-status").value,
    method: document.getElementById("e-method").value,
    paidDate: document.getElementById("e-paid").value,
    notes: document.getElementById("e-notes").value,
  };
  save(); toast("✅ Saved!"); goTo("list");
}

function deleteBill() {
  if (!confirm("Delete this bill?")) return;
  const id = document.getElementById("e-id").value;
  bills = bills.filter(b => b.id !== id);
  save(); toast("Deleted."); goTo("list");
}

// QUERY
async function runQuery() {
  const q = document.getElementById("query-input").value.trim();
  if (!q) return;
  const btn = document.getElementById("ask-btn");
  const res = document.getElementById("query-result");
  btn.textContent = "Thinking…"; btn.disabled = true;
  res.style.display = "none";
  const summary = JSON.stringify(bills.map(b=>({vendor:b.vendor,category:b.category,amount:b.amount,date:b.date,due:b.due,status:b.status,method:b.method,paidDate:b.paidDate,notes:b.notes})));
  try {
    const r = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:400,messages:[{role:"user",content:`Bills: ${summary}\nQuestion: ${q}\nAnswer briefly. Use ₹ for amounts.`}]})});
    const d = await r.json();
    res.textContent = d.content?.find(x=>x.type==="text")?.text || "No answer.";
  } catch { res.textContent = "Could not connect. Try again."; }
  res.style.display = "block";
  btn.textContent = "Ask"; btn.disabled = false;
}

// EXPORT / IMPORT
function exportJSON() {
  if (!bills.length) { toast("No bills yet."); return; }
  const blob = new Blob([JSON.stringify({exported:new Date().toISOString(),bills},null,2)],{type:"application/json"});
  dl(blob, `bills-${now.toISOString().slice(0,10)}.json`);
  toast(`✅ ${bills.length} bills backed up`);
}
function exportCSV() {
  if (!bills.length) { toast("No bills yet."); return; }
  const h = ["Vendor","Category","Invoice","Bill Date","Due Date","Amount","Status","Method","Paid Date","Notes"];
  const rows = bills.map(b=>[b.vendor,b.category,b.invoice||"",b.date||"",b.due||"",b.amount,b.status,b.method||"",b.paidDate||"",b.notes||""].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(","));
  const blob = new Blob(["\uFEFF"+[h.join(","),...rows].join("\r\n")],{type:"text/csv;charset=utf-8"});
  dl(blob, `bills-${now.toISOString().slice(0,10)}.csv`);
  toast("✅ CSV exported");
}
function importJSON(e) {
  const file = e.target.files[0]; if(!file) return;
  const r = new FileReader(); r.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      const imp = Array.isArray(d) ? d : (d.bills||[]);
      const ids = new Set(bills.map(b=>b.id));
      const added = imp.filter(b=>!ids.has(b.id));
      bills = [...added,...bills];
      save(); renderStats(); toast(`✅ Imported ${added.length} bills`);
    } catch { toast("⚠️ Invalid backup file"); }
    e.target.value="";
  }; r.readAsText(file);
}
function dl(blob, name) {
  const a = document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=name; a.click();
}

// UTILS
function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function toast(msg) {
  const t = document.getElementById("toast"); t.textContent=msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),3000);
}

// Init
renderStats();
</script>
